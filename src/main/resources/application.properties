spring.application.name=integration-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8082}

internal.api.secret=${INTERNAL_API_SECRET}

frontend.app.url=${FRONTEND_APP_URL:http://localhost:5173}
admin.panel.url=${ADMIN_PANEL_URL:http://localhost:8080}
core.app.url=${CORE_APP_URL:http://localhost:8081}
gym.app.url=${GYM_APP_URL:http://gym-app/api/payments/webhook}

logging.level.org.springframework.web=INFO
logging.level.com.integration_service=DEBUG

integration.health.degraded-threshold=3

integration.payment.link-expiry-seconds=3600
integration.payment.retry.max-attempts=5
integration.payment.retry.fixed-delay-ms=300000

app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8082}

whatsapp.api-version=v22.0
