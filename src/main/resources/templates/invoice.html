<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 40px; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .gym-name { font-size: 28px; font-weight: bold; color: #1a73e8; }
        .invoice-title { font-size: 20px; margin-top: 10px; color: #666; }
        .content { margin-top: 40px; }
        .details-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .details-table th, .details-table td { border: 1px solid #eee; padding: 12px; text-align: left; }
        .details-table th { background-color: #f9f9f9; }
        .footer { margin-top: 50px; text-align: center; font-size: 14px; color: #888; }
        .total { font-size: 18px; font-weight: bold; margin-top: 20px; text-align: right; }
    </style>
</head>
<body>
    <div class="header">
        <div class="gym-name" th:text="${gymName}">Elite Gym</div>
        <div class="invoice-title">Payment Receipt</div>
    </div>

    <div class="content">
        <p><strong>Member Name:</strong> <span th:text="${memberName}">John Doe</span></p>
        <p><strong>Invoice ID:</strong> <span th:text="${invoiceId}">RP123456</span></p>
        <p><strong>Payment Date:</strong> <span th:text="${#temporals.format(paymentDate, 'dd-MM-yyyy HH:mm')}">25-04-2026</span></p>

        <table class="details-table">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Duration</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Gym Subscription</td>
                    <td th:text="${duration}">30 Days</td>
                    <td th:text="'₹' + ${amount}">₹1000.00</td>
                </tr>
            </tbody>
        </table>

        <div class="total">
            Total Paid: <span th:text="'₹' + ${amount}">₹1000.00</span>
        </div>
    </div>

    <div class="footer">
        Thank you for being a part of Elite Gym!
    </div>
</body>
</html>
